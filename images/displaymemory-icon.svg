<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="DisplayMemory">
  <rect width="512" height="512" rx="115" fill="#0d1117"/>
  <!-- display / screen -->
  <rect x="92" y="108" width="328" height="216" rx="26" fill="#15233c" stroke="#1f6feb" stroke-width="12"/>
  <!-- captured text lines (one highlighted = the search hit) -->
  <rect x="126" y="148" width="198" height="22" rx="11" fill="#58a6ff"/>
  <rect x="126" y="192" width="262" height="22" rx="11" fill="#34466a"/>
  <rect x="126" y="236" width="226" height="22" rx="11" fill="#34466a"/>
  <!-- magnifier: searching the remembered screen -->
  <circle cx="356" cy="318" r="60" fill="none" stroke="#e6edf3" stroke-width="20"/>
  <line x1="400" y1="362" x2="444" y2="406" stroke="#e6edf3" stroke-width="28" stroke-linecap="round"/>
</svg>
